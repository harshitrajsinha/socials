apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deploy
  labels:
    app: redis-deploy
  namespace: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-app
    spec:
      containers:
      - name: redis-container
        image: redis:alpine3.23
        ports:
        - containerPort: 6379
